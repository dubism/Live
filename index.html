<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Blueprint Compass</title>
  <style>
    :root { color-scheme: dark; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #111; color: #fff; }
    body { position: fixed; inset: 0; touch-action: none; }
    #viewport { position: absolute; inset: 0; overflow: hidden; perspective: 900px; perspective-origin: 50% 50%; background: radial-gradient(circle at center, #292929, #111 70%); }
    #rotator { position: absolute; left: 50%; top: 62%; width: 0; height: 0; transform-origin: 0 0; transform-style: preserve-3d; will-change: transform; }
    #planeLayer { position: absolute; left: 0; top: 0; width: 0; height: 0; transform-origin: 0 0; transform-style: preserve-3d; will-change: transform; }
    #plan { position: absolute; left: 0; top: 0; translate: -50% -50%; max-width: 94vw; max-height: 84dvh; object-fit: contain; user-select: none; -webkit-user-drag: none; box-shadow: 0 5px 28px #0009; display: none; }
    #empty { position: absolute; inset: 0; display: grid; place-content: center; gap: 12px; padding: 32px; text-align: center; color: #aaa; pointer-events: none; }
    #empty strong { color: #fff; font-size: 24px; }
    #status { position: absolute; top: max(6px, env(safe-area-inset-top)); right: max(6px, env(safe-area-inset-right)); z-index: 5; padding: 5px 7px; border-radius: 8px; background: #0006; color: #ddd; font-size: 11px; backdrop-filter: blur(10px); }
    #status::after { content: " · 3D"; opacity: .55; }
    #status.live { color: #9ef0b0; }
    #controls { position: absolute; z-index: 10; left: max(12px, env(safe-area-inset-left)); right: max(12px, env(safe-area-inset-right)); bottom: max(12px, env(safe-area-inset-bottom)); display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
    button, .fileButton { min-height: 46px; border: 0; border-radius: 14px; padding: 0 16px; display: inline-flex; align-items: center; justify-content: center; background: #343434e8; color: #fff; font: 650 15px/1 system-ui; backdrop-filter: blur(18px); box-shadow: 0 2px 12px #0005; }
    button.primary, .fileButton.primary { background: #f2f2f2; color: #111; }
    #controls.viewer { left: max(6px, env(safe-area-inset-left)); right: max(6px, env(safe-area-inset-right)); bottom: max(6px, env(safe-area-inset-bottom)); flex-wrap: nowrap; gap: 4px; }
    #controls.viewer button, #controls.viewer .fileButton { flex: 1 1 0; min-width: 0; min-height: 36px; padding: 0 8px; border: 1px solid #ffffff12; border-radius: 10px; background: #171717a6; color: #f1f1f1; font-size: 12.5px; font-weight: 590; white-space: nowrap; box-shadow: none; backdrop-filter: blur(14px); }
    #controls.viewer button.primary { background: #ffffff24; color: #fff; border-color: #ffffff25; }
    button:disabled { opacity: .38; }
    input[type=file] { display: none; }
    [hidden] { display: none !important; }
    #hint { position: absolute; z-index: 8; left: 50%; bottom: calc(max(12px, env(safe-area-inset-bottom)) + var(--controls-height, 46px) + 12px); translate: -50% 0; width: min(520px, calc(100% - 32px)); padding: 10px 14px; border-radius: 12px; background: #000b; text-align: center; color: #ddd; font-size: 13px; line-height: 1.35; pointer-events: none; transition: opacity .3s; backdrop-filter: blur(12px); }
    #calibration { position: absolute; z-index: 20; top: max(38px, calc(env(safe-area-inset-top) + 34px)); right: max(6px, env(safe-area-inset-right)); width: min(310px, calc(100vw - 12px)); padding: 14px; border: 1px solid #ffffff17; border-radius: 14px; background: #171717e8; box-shadow: 0 14px 50px #0009; backdrop-filter: blur(24px); touch-action: none; }
    #calibration header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; font-size: 14px; font-weight: 700; }
    #calibration header button { min-height: 28px; padding: 0 9px; border-radius: 8px; font-size: 12px; box-shadow: none; }
    .calRow { display: grid; grid-template-columns: 1fr auto; gap: 5px 10px; margin: 11px 0; color: #ddd; font-size: 12px; }
    .calRow input { grid-column: 1 / -1; width: 100%; accent-color: #fff; }
    .calRow output { color: #fff; font-variant-numeric: tabular-nums; }
    #calActions { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 12px; }
    #calActions button { min-height: 36px; padding: 0 8px; border-radius: 9px; background: #ffffff12; box-shadow: none; font-size: 12px; }
    #resetCalibration { grid-column: 1 / -1; }
    #tiltReadout { margin-top: 8px; color: #999; font-size: 11px; text-align: center; font-variant-numeric: tabular-nums; }
    @media (max-height: 430px) { #plan { max-height: 84dvh; max-width: 92vw; } button, .fileButton { min-height: 42px; } }
  </style>
</head>
<body>
  <main id="viewport">
    <div id="rotator"><div id="planeLayer"><img id="plan" alt="Your blueprint"></div></div>
    <div id="empty"><strong>Blueprint Compass</strong><span>Choose a photo of your floor plan to begin.</span></div>
    <div id="status" hidden></div>
    <div id="hint" hidden></div>
    <section id="calibration" hidden>
      <header><span>3D calibration</span><button id="closeCalibration">Done</button></header>
      <label class="calRow"><span>Flat tolerance</span><output id="toleranceOut">7°</output><input id="tolerance" type="range" min="0" max="20" step="1" value="7"></label>
      <label class="calRow"><span>Transition softness</span><output id="transitionOut">12°</output><input id="transition" type="range" min="4" max="30" step="1" value="12"></label>
      <label class="calRow"><span>Perspective depth</span><output id="perspectiveOut">900</output><input id="perspective" type="range" min="450" max="1600" step="50" value="900"></label>
      <label class="calRow"><span>View centre</span><output id="pivotOut">62%</output><input id="pivot" type="range" min="50" max="72" step="1" value="62"></label>
      <div id="calActions">
        <button id="calibrateFlat">Use current as flat</button>
        <button id="reverseTilt">Reverse tilt</button>
        <button id="resetCalibration">Defaults</button>
      </div>
      <div id="tiltReadout">Tilt 0° · 2D</div>
    </section>
  </main>
  <nav id="controls">
    <label class="fileButton primary"><span id="fileText">Choose blueprint</span><input id="file" type="file" accept="image/*"></label>
    <button id="compass" class="primary" hidden>Enable compass</button>
    <button id="orient" disabled hidden>Lock orientation</button>
    <button id="fit" disabled hidden>Fit view</button>
  </nav>

  <script>
    const plan = document.querySelector('#plan');
    const rotator = document.querySelector('#rotator');
    const planeLayer = document.querySelector('#planeLayer');
    const empty = document.querySelector('#empty');
    const file = document.querySelector('#file');
    const fileText = document.querySelector('#fileText');
    const compassBtn = document.querySelector('#compass');
    const orientBtn = document.querySelector('#orient');
    const fitBtn = document.querySelector('#fit');
    const controls = document.querySelector('#controls');
    const viewport = document.querySelector('#viewport');
    const status = document.querySelector('#status');
    const hint = document.querySelector('#hint');
    const calibrationPanel = document.querySelector('#calibration');
    const toleranceInput = document.querySelector('#tolerance');
    const transitionInput = document.querySelector('#transition');
    const perspectiveInput = document.querySelector('#perspective');
    const pivotInput = document.querySelector('#pivot');
    const toleranceOut = document.querySelector('#toleranceOut');
    const transitionOut = document.querySelector('#transitionOut');
    const perspectiveOut = document.querySelector('#perspectiveOut');
    const pivotOut = document.querySelector('#pivotOut');
    const tiltReadout = document.querySelector('#tiltReadout');

    let heading = null;
    let worldAngle = null;
    let orientationEditing = true;
    let compassRunning = false;
    let imageURL = null;
    let scale = 1, planeX = 0, planeY = 0;
    let gestureStart = null;
    let rawBeta = 0, rawGamma = 0;
    let filteredPitch = 0, filteredRoll = 0;

    const defaults = { tolerance: 7, transition: 12, perspective: 900, pivot: 62, direction: 1, neutralBeta: 0, neutralGamma: 0 };
    let calibration = { ...defaults };
    try { calibration = { ...defaults, ...JSON.parse(localStorage.getItem('blueprintCompass3D') || '{}') }; } catch {}

    const normalize = degrees => ((degrees % 360) + 360) % 360;
    const shortest = degrees => ((degrees + 540) % 360) - 180;
    const clamp = (value, min, max) => Math.min(max, Math.max(min, value));
    const smoothstep = value => { const x = clamp(value, 0, 1); return x * x * (3 - 2 * x); };
    const mapRotation = () => worldAngle === null || heading === null ? 0 : shortest(worldAngle - heading);

    function tiltPose() {
      const magnitude = Math.hypot(filteredPitch, filteredRoll);
      const blend = smoothstep((magnitude - calibration.tolerance) / calibration.transition);
      return {
        pitch: clamp(filteredPitch * blend * calibration.direction, -60, 60),
        roll: clamp(-filteredRoll * blend * calibration.direction, -60, 60),
        magnitude,
        blend
      };
    }

    const multiply3 = (a, b) => [
      a[0]*b[0]+a[1]*b[3]+a[2]*b[6], a[0]*b[1]+a[1]*b[4]+a[2]*b[7], a[0]*b[2]+a[1]*b[5]+a[2]*b[8],
      a[3]*b[0]+a[4]*b[3]+a[5]*b[6], a[3]*b[1]+a[4]*b[4]+a[5]*b[7], a[3]*b[2]+a[4]*b[5]+a[5]*b[8],
      a[6]*b[0]+a[7]*b[3]+a[8]*b[6], a[6]*b[1]+a[7]*b[4]+a[8]*b[7], a[6]*b[2]+a[7]*b[5]+a[8]*b[8]
    ];

    function orientationMatrix() {
      const { pitch, roll } = tiltPose();
      const x = pitch * Math.PI / 180;
      const y = roll * Math.PI / 180;
      const z = mapRotation() * Math.PI / 180;
      const rx = [1,0,0, 0,Math.cos(x),-Math.sin(x), 0,Math.sin(x),Math.cos(x)];
      const ry = [Math.cos(y),0,Math.sin(y), 0,1,0, -Math.sin(y),0,Math.cos(y)];
      const rz = [Math.cos(z),-Math.sin(z),0, Math.sin(z),Math.cos(z),0, 0,0,1];
      return multiply3(multiply3(rx, ry), rz);
    }

    function projectPlanePoint(point, matrix = orientationMatrix()) {
      const x = matrix[0] * point.x + matrix[1] * point.y;
      const y = matrix[3] * point.x + matrix[4] * point.y;
      const z = matrix[6] * point.x + matrix[7] * point.y;
      const factor = calibration.perspective / Math.max(80, calibration.perspective - z);
      return { x: x * factor, y: y * factor };
    }

    function unprojectScreen(screenPoint, matrix = orientationMatrix()) {
      const d = calibration.perspective;
      const a = -screenPoint.x * matrix[6] - d * matrix[0];
      const b = -screenPoint.x * matrix[7] - d * matrix[1];
      const c = -screenPoint.y * matrix[6] - d * matrix[3];
      const e = -screenPoint.y * matrix[7] - d * matrix[4];
      const f = -screenPoint.x * d;
      const g = -screenPoint.y * d;
      const determinant = a * e - b * c;
      if (Math.abs(determinant) < .0001) return { ...screenPoint };
      return { x: (f * e - b * g) / determinant, y: (a * g - f * c) / determinant };
    }

    const viewPivot = () => ({ x: viewport.clientWidth / 2, y: viewport.clientHeight * calibration.pivot / 100 });

    function preserveGestureFocal() {
      if (!gestureStart?.focalContent || !gestureStart.currentMid) return;
      const pivot = viewPivot();
      const planePoint = unprojectScreen({
        x: gestureStart.currentMid.x - pivot.x,
        y: gestureStart.currentMid.y - pivot.y
      });
      planeX = planePoint.x - scale * gestureStart.focalContent.x;
      planeY = planePoint.y - scale * gestureStart.focalContent.y;
    }

    function render() {
      const pose = tiltPose();
      viewport.style.perspective = `${calibration.perspective}px`;
      viewport.style.perspectiveOrigin = `50% ${calibration.pivot}%`;
      rotator.style.top = `${calibration.pivot}%`;
      rotator.style.transform = `rotateX(${pose.pitch}deg) rotateY(${pose.roll}deg) rotateZ(${mapRotation()}deg)`;
      planeLayer.style.transform = `translate3d(${planeX}px, ${planeY}px, 0) scale(${scale})`;
      tiltReadout.textContent = `Tilt ${Math.round(pose.magnitude)}° · ${Math.round(pose.blend * 100)}% 3D`;
    }

    function updateOrientationUI() {
      const usable = Boolean(plan.src) && heading !== null;
      orientBtn.hidden = !usable;
      orientBtn.disabled = !usable;
      fitBtn.hidden = !usable;
      fitBtn.disabled = !usable;
      controls.classList.toggle('viewer', usable);
      orientBtn.textContent = orientationEditing ? 'Lock orientation' : 'Edit orientation';
      orientBtn.classList.toggle('primary', usable && orientationEditing);
    }

    function initialiseWorldAngle() {
      if (plan.src && heading !== null && worldAngle === null) {
        worldAngle = heading;
        orientationEditing = true;
      }
      updateOrientationUI();
    }

    function setHint(text, fade = false) {
      clearTimeout(setHint.timer);
      hint.hidden = !text;
      hint.textContent = text;
      if (!text) return;
      hint.style.opacity = '1';
      if (fade) setHint.timer = setTimeout(() => hint.style.opacity = '0', 4200);
    }

    file.addEventListener('change', () => {
      const selected = file.files && file.files[0];
      if (!selected) return;
      if (imageURL) URL.revokeObjectURL(imageURL);
      imageURL = URL.createObjectURL(selected);
      plan.src = imageURL;
      plan.style.display = 'block';
      empty.style.display = 'none';
      fileText.textContent = 'Change blueprint';
      document.querySelector('.fileButton').classList.remove('primary');
      compassBtn.hidden = compassRunning;
      worldAngle = heading;
      orientationEditing = true;
      scale = 1; planeX = 0; planeY = 0;
      initialiseWorldAngle();
      render();
      setHint(compassRunning ? 'Twist with two fingers until the plan matches the flat, then lock orientation.' : '');
    });

    function updateTiltFromEvent(event) {
      if (typeof event.beta !== 'number' || typeof event.gamma !== 'number') return;
      rawBeta = event.beta;
      rawGamma = event.gamma;
      const devicePitch = clamp(rawBeta - calibration.neutralBeta, -89, 89);
      const deviceRoll = clamp(rawGamma - calibration.neutralGamma, -89, 89);
      const screenAngle = Number(screen.orientation?.angle ?? window.orientation ?? 0) * Math.PI / 180;
      const targetPitch = devicePitch * Math.cos(screenAngle) - deviceRoll * Math.sin(screenAngle);
      const targetRoll = deviceRoll * Math.cos(screenAngle) + devicePitch * Math.sin(screenAngle);
      filteredPitch += (targetPitch - filteredPitch) * .24;
      filteredRoll += (targetRoll - filteredRoll) * .24;
    }

    function orientationHandler(event) {
      updateTiltFromEvent(event);
      let next = null;
      if (typeof event.webkitCompassHeading === 'number') {
        next = event.webkitCompassHeading;
      } else if (event.absolute && typeof event.alpha === 'number') {
        next = 360 - event.alpha;
      }
      if (next === null || Number.isNaN(next)) {
        preserveGestureFocal();
        render();
        return;
      }
      const rawHeading = normalize(next);
      heading = heading === null ? rawHeading : normalize(heading + shortest(rawHeading - heading) * .32);
      const accuracy = typeof event.webkitCompassAccuracy === 'number' && event.webkitCompassAccuracy >= 0
        ? ` · ±${Math.round(event.webkitCompassAccuracy)}°`
        : '';
      status.textContent = `${Math.round(heading)}°${accuracy}`;
      status.hidden = false;
      status.classList.add('live');
      initialiseWorldAngle();
      preserveGestureFocal();
      render();
    }

    async function enableCompass() {
      try {
        if (!window.DeviceOrientationEvent) throw new Error('Motion sensors are unavailable in this browser.');
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
          const permission = await DeviceOrientationEvent.requestPermission();
          if (permission !== 'granted') throw new Error('Compass permission was not granted.');
        }
        window.addEventListener('deviceorientation', orientationHandler, true);
        compassRunning = true;
        compassBtn.textContent = 'Compass enabled';
        compassBtn.disabled = true;
        compassBtn.classList.remove('primary');
        compassBtn.hidden = true;
        status.hidden = false;
        status.textContent = 'Finding heading…';
        setHint('Twist with two fingers until the plan matches the flat, then lock orientation.');
        if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(() => {});
      } catch (error) {
        status.hidden = false;
        status.textContent = 'Compass unavailable';
        compassBtn.hidden = false;
        setHint(`${error.message} Open this page directly in Safari over HTTPS, then try again.`);
      }
    }

    compassBtn.addEventListener('click', enableCompass);

    orientBtn.addEventListener('click', () => {
      if (heading === null) { setHint('No compass heading yet. Move the phone in a figure eight, then try again.'); return; }
      orientationEditing = !orientationEditing;
      updateOrientationUI();
      setHint(orientationEditing
        ? 'Orientation edit: twist with two fingers. The compass remains live.'
        : 'Orientation locked. Drag to pan and pinch to zoom.', true);
      if (navigator.vibrate) navigator.vibrate(30);
    });

    fitBtn.addEventListener('click', () => {
      gestureStart = null;
      scale = 1; planeX = 0; planeY = 0;
      planeLayer.style.transition = 'transform 220ms ease-out';
      render();
      setTimeout(() => { planeLayer.style.transition = ''; }, 240);
      setHint('Plan centred and fitted.', true);
    });

    function saveCalibration() {
      localStorage.setItem('blueprintCompass3D', JSON.stringify(calibration));
    }

    function syncCalibrationUI() {
      toleranceInput.value = calibration.tolerance;
      transitionInput.value = calibration.transition;
      perspectiveInput.value = calibration.perspective;
      pivotInput.value = calibration.pivot;
      toleranceOut.textContent = `${calibration.tolerance}°`;
      transitionOut.textContent = `${calibration.transition}°`;
      perspectiveOut.textContent = calibration.perspective;
      pivotOut.textContent = `${calibration.pivot}%`;
      document.querySelector('#reverseTilt').textContent = calibration.direction === 1 ? 'Reverse tilt' : 'Tilt reversed';
      render();
    }

    status.addEventListener('click', () => { calibrationPanel.hidden = !calibrationPanel.hidden; syncCalibrationUI(); });
    document.querySelector('#closeCalibration').addEventListener('click', () => { calibrationPanel.hidden = true; });

    toleranceInput.addEventListener('input', () => {
      calibration.tolerance = Number(toleranceInput.value);
      saveCalibration(); syncCalibrationUI();
    });
    transitionInput.addEventListener('input', () => {
      calibration.transition = Number(transitionInput.value);
      saveCalibration(); syncCalibrationUI();
    });
    perspectiveInput.addEventListener('input', () => {
      calibration.perspective = Number(perspectiveInput.value);
      saveCalibration(); syncCalibrationUI();
    });
    pivotInput.addEventListener('input', () => {
      calibration.pivot = Number(pivotInput.value);
      saveCalibration(); syncCalibrationUI();
    });
    document.querySelector('#calibrateFlat').addEventListener('click', () => {
      calibration.neutralBeta = rawBeta;
      calibration.neutralGamma = rawGamma;
      filteredPitch = 0; filteredRoll = 0;
      saveCalibration(); syncCalibrationUI();
      setHint('Current phone angle set as flat.', true);
    });
    document.querySelector('#reverseTilt').addEventListener('click', () => {
      calibration.direction *= -1;
      saveCalibration(); syncCalibrationUI();
    });
    document.querySelector('#resetCalibration').addEventListener('click', () => {
      calibration = { ...defaults };
      filteredPitch = 0; filteredRoll = 0;
      saveCalibration(); syncCalibrationUI();
    });
    syncCalibrationUI();

    const updateControlsHeight = () => {
      document.documentElement.style.setProperty('--controls-height', `${controls.offsetHeight}px`);
    };
    new ResizeObserver(updateControlsHeight).observe(controls);
    addEventListener('resize', updateControlsHeight);
    updateControlsHeight();

    const point = touch => ({ x: touch.clientX, y: touch.clientY });
    const distance = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
    const midpoint = (a, b) => ({ x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 });
    const angle = (a, b) => Math.atan2(b.y - a.y, b.x - a.x) * 180 / Math.PI;

    function beginGesture(touchList) {
      rotator.style.transition = '';
      planeLayer.style.transition = '';
      const touches = [...touchList].slice(0, 2).map(point);
      if (!touches.length) { gestureStart = null; return; }
      const mid = touches.length > 1 ? midpoint(touches[0], touches[1]) : touches[0];
      const pivot = viewPivot();
      const grabbedPlanePoint = unprojectScreen({ x: mid.x - pivot.x, y: mid.y - pivot.y });
      const focalContent = {
        x: (grabbedPlanePoint.x - planeX) / scale,
        y: (grabbedPlanePoint.y - planeY) / scale
      };
      gestureStart = {
        touches, mid, currentMid: mid, scale, planeX, planeY,
        worldAngle,
        distance: touches.length > 1 ? distance(touches[0], touches[1]) : 0,
        angle: touches.length > 1 ? angle(touches[0], touches[1]) : 0,
        focalContent
      };
    }

    document.addEventListener('touchstart', event => {
      if (!plan.src || event.target.closest('#controls, #calibration, #status')) return;
      beginGesture(event.touches);
    }, { passive: false });

    document.addEventListener('touchmove', event => {
      if (!gestureStart || event.target.closest('#controls, #calibration, #status')) return;
      event.preventDefault();
      const touches = [...event.touches].slice(0, 2).map(point);
      if (touches.length === 1 && gestureStart.touches.length === 1) {
        gestureStart.currentMid = touches[0];
        preserveGestureFocal();
      } else if (touches.length > 1 && gestureStart.distance) {
        scale = Math.min(6, Math.max(.35, gestureStart.scale * distance(touches[0], touches[1]) / gestureStart.distance));
        const mid = midpoint(touches[0], touches[1]);
        gestureStart.currentMid = mid;
        if (orientationEditing && gestureStart.worldAngle !== null) {
          worldAngle = normalize(gestureStart.worldAngle + shortest(angle(touches[0], touches[1]) - gestureStart.angle));
        }
        preserveGestureFocal();
      }
      render();
    }, { passive: false });

    document.addEventListener('touchend', event => { beginGesture(event.touches); }, { passive: true });
    document.addEventListener('touchcancel', () => { gestureStart = null; }, { passive: true });
  </script>
</body>
</html>
