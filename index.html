<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Blueprint Compass</title>
  <style>
    :root { color-scheme: dark; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #111; color: #fff; }
    body { position: fixed; inset: 0; touch-action: none; }
    #viewport { position: absolute; inset: 0; overflow: hidden; background: radial-gradient(circle at center, #292929, #111 70%); }
    #rotator { position: absolute; inset: -45vmax; display: grid; place-items: center; will-change: transform; }
    #plan { max-width: 78vw; max-height: 68vh; object-fit: contain; user-select: none; -webkit-user-drag: none; box-shadow: 0 8px 45px #000b; display: none; }
    #empty { position: absolute; inset: 0; display: grid; place-content: center; gap: 12px; padding: 32px; text-align: center; color: #aaa; pointer-events: none; }
    #empty strong { color: #fff; font-size: 24px; }
    #status { position: absolute; top: max(12px, env(safe-area-inset-top)); right: max(12px, env(safe-area-inset-right)); z-index: 5; padding: 7px 10px; border-radius: 999px; background: #0009; color: #ddd; font-size: 12px; backdrop-filter: blur(12px); }
    #status.live { color: #9ef0b0; }
    #controls { position: absolute; z-index: 10; left: max(12px, env(safe-area-inset-left)); right: max(12px, env(safe-area-inset-right)); bottom: max(12px, env(safe-area-inset-bottom)); display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
    button, .fileButton { min-height: 46px; border: 0; border-radius: 14px; padding: 0 16px; display: inline-flex; align-items: center; justify-content: center; background: #343434e8; color: #fff; font: 650 15px/1 system-ui; backdrop-filter: blur(18px); box-shadow: 0 2px 12px #0005; }
    button.primary { background: #f2f2f2; color: #111; }
    button:disabled { opacity: .38; }
    input[type=file] { display: none; }
    [hidden] { display: none !important; }
    #hint { position: absolute; z-index: 8; left: 50%; bottom: calc(max(12px, env(safe-area-inset-bottom)) + var(--controls-height, 46px) + 12px); translate: -50% 0; width: min(520px, calc(100% - 32px)); padding: 10px 14px; border-radius: 12px; background: #000b; text-align: center; color: #ddd; font-size: 13px; line-height: 1.35; pointer-events: none; transition: opacity .3s; backdrop-filter: blur(12px); }
    @media (max-height: 430px) { #plan { max-height: 62vh; max-width: 74vw; } button, .fileButton { min-height: 42px; } }
  </style>
</head>
<body>
  <main id="viewport">
    <div id="rotator"><img id="plan" alt="Your blueprint"></div>
    <div id="empty"><strong>Blueprint Compass</strong><span>Choose a photo of your floor plan to begin.</span></div>
    <div id="status">Compass off</div>
    <div id="hint">Choose a blueprint, then enable the compass.</div>
  </main>
  <nav id="controls">
    <label class="fileButton">Choose blueprint<input id="file" type="file" accept="image/*"></label>
    <button id="compass" class="primary">Enable compass</button>
    <button id="orient" disabled hidden>Lock orientation</button>
    <button id="reset" disabled hidden>Reset view</button>
  </nav>

  <script>
    const plan = document.querySelector('#plan');
    const rotator = document.querySelector('#rotator');
    const empty = document.querySelector('#empty');
    const file = document.querySelector('#file');
    const compassBtn = document.querySelector('#compass');
    const orientBtn = document.querySelector('#orient');
    const resetBtn = document.querySelector('#reset');
    const controls = document.querySelector('#controls');
    const status = document.querySelector('#status');
    const hint = document.querySelector('#hint');

    let heading = null;
    let worldAngle = null;
    let orientationEditing = true;
    let compassRunning = false;
    let imageURL = null;
    let scale = 1, panX = 0, panY = 0;
    let gestureStart = null;

    const normalize = degrees => ((degrees % 360) + 360) % 360;
    const shortest = degrees => ((degrees + 540) % 360) - 180;
    const mapRotation = () => worldAngle === null || heading === null ? 0 : shortest(worldAngle - heading);

    function render() {
      rotator.style.transform = `translate(${panX}px, ${panY}px) rotate(${mapRotation()}deg) scale(${scale})`;
    }

    function updateOrientationUI() {
      const usable = Boolean(plan.src) && heading !== null;
      orientBtn.hidden = !usable;
      orientBtn.disabled = !usable;
      orientBtn.textContent = orientationEditing ? 'Lock orientation' : 'Edit orientation';
      orientBtn.classList.toggle('primary', usable && orientationEditing);
    }

    function initialiseWorldAngle() {
      if (plan.src && heading !== null && worldAngle === null) {
        worldAngle = heading;
        orientationEditing = true;
      }
      updateOrientationUI();
    }

    function setHint(text, fade = false) {
      hint.textContent = text;
      hint.style.opacity = '1';
      clearTimeout(setHint.timer);
      if (fade) setHint.timer = setTimeout(() => hint.style.opacity = '0', 4200);
    }

    file.addEventListener('change', () => {
      const selected = file.files && file.files[0];
      if (!selected) return;
      if (imageURL) URL.revokeObjectURL(imageURL);
      imageURL = URL.createObjectURL(selected);
      plan.src = imageURL;
      plan.style.display = 'block';
      empty.style.display = 'none';
      resetBtn.disabled = false;
      resetBtn.hidden = false;
      worldAngle = heading;
      orientationEditing = true;
      scale = 1; panX = 0; panY = 0;
      initialiseWorldAngle();
      render();
      setHint(compassRunning ? 'Twist the plan with two fingers until it matches the flat, then tap Lock orientation.' : 'Now tap Enable compass.');
    });

    function orientationHandler(event) {
      let next = null;
      if (typeof event.webkitCompassHeading === 'number') {
        next = event.webkitCompassHeading;
      } else if (event.absolute && typeof event.alpha === 'number') {
        next = 360 - event.alpha;
      }
      if (next === null || Number.isNaN(next)) return;
      const rawHeading = normalize(next);
      heading = heading === null ? rawHeading : normalize(heading + shortest(rawHeading - heading) * .32);
      const accuracy = typeof event.webkitCompassAccuracy === 'number' && event.webkitCompassAccuracy >= 0
        ? ` · ±${Math.round(event.webkitCompassAccuracy)}°`
        : '';
      status.textContent = `${Math.round(heading)}°${accuracy}`;
      status.classList.add('live');
      initialiseWorldAngle();
      render();
    }

    async function enableCompass() {
      try {
        if (!window.DeviceOrientationEvent) throw new Error('Motion sensors are unavailable in this browser.');
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
          const permission = await DeviceOrientationEvent.requestPermission();
          if (permission !== 'granted') throw new Error('Compass permission was not granted.');
        }
        window.addEventListener('deviceorientation', orientationHandler, true);
        compassRunning = true;
        compassBtn.textContent = 'Compass enabled';
        compassBtn.disabled = true;
        compassBtn.classList.remove('primary');
        compassBtn.hidden = true;
        status.textContent = 'Finding heading…';
        setHint(plan.src ? 'Twist the plan with two fingers until it matches the flat, then tap Lock orientation.' : 'Choose your blueprint photo.');
        if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(() => {});
      } catch (error) {
        status.textContent = 'Compass unavailable';
        setHint(`${error.message} Open this page directly in Safari over HTTPS, then try again.`);
      }
    }

    compassBtn.addEventListener('click', enableCompass);

    orientBtn.addEventListener('click', () => {
      if (heading === null) { setHint('No compass heading yet. Move the phone in a figure eight, then try again.'); return; }
      orientationEditing = !orientationEditing;
      updateOrientationUI();
      setHint(orientationEditing
        ? 'Orientation edit: twist with two fingers. The compass remains live.'
        : 'Orientation locked. Drag to pan and pinch to zoom.', true);
      if (navigator.vibrate) navigator.vibrate(30);
    });

    resetBtn.addEventListener('click', () => {
      gestureStart = null;
      scale = 1; panX = 0; panY = 0;
      rotator.style.transition = 'transform 220ms ease-out';
      render();
      setTimeout(() => { rotator.style.transition = ''; }, 240);
      setHint('Zoom and position reset. The plan orientation is unchanged.', true);
    });

    const updateControlsHeight = () => {
      document.documentElement.style.setProperty('--controls-height', `${controls.offsetHeight}px`);
    };
    new ResizeObserver(updateControlsHeight).observe(controls);
    addEventListener('resize', updateControlsHeight);
    updateControlsHeight();

    const point = touch => ({ x: touch.clientX, y: touch.clientY });
    const distance = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
    const midpoint = (a, b) => ({ x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 });
    const angle = (a, b) => Math.atan2(b.y - a.y, b.x - a.x) * 180 / Math.PI;

    function beginGesture(touchList) {
      rotator.style.transition = '';
      const touches = [...touchList].slice(0, 2).map(point);
      if (!touches.length) { gestureStart = null; return; }
      const mid = touches.length > 1 ? midpoint(touches[0], touches[1]) : touches[0];
      gestureStart = {
        touches, mid, scale, panX, panY,
        worldAngle,
        rotation: mapRotation(),
        distance: touches.length > 1 ? distance(touches[0], touches[1]) : 0,
        angle: touches.length > 1 ? angle(touches[0], touches[1]) : 0,
        focal: { x: mid.x - innerWidth / 2 - panX, y: mid.y - innerHeight / 2 - panY }
      };
    }

    document.addEventListener('touchstart', event => {
      if (!plan.src || event.target.closest('#controls')) return;
      beginGesture(event.touches);
    }, { passive: false });

    document.addEventListener('touchmove', event => {
      if (!gestureStart || event.target.closest('#controls')) return;
      event.preventDefault();
      const touches = [...event.touches].slice(0, 2).map(point);
      if (touches.length === 1 && gestureStart.touches.length === 1) {
        panX = gestureStart.panX + touches[0].x - gestureStart.touches[0].x;
        panY = gestureStart.panY + touches[0].y - gestureStart.touches[0].y;
      } else if (touches.length > 1 && gestureStart.distance) {
        scale = Math.min(6, Math.max(.35, gestureStart.scale * distance(touches[0], touches[1]) / gestureStart.distance));
        const mid = midpoint(touches[0], touches[1]);
        if (orientationEditing && gestureStart.worldAngle !== null) {
          worldAngle = normalize(gestureStart.worldAngle + shortest(angle(touches[0], touches[1]) - gestureStart.angle));
        }
        const rotationDelta = shortest(mapRotation() - gestureStart.rotation) * Math.PI / 180;
        const zoom = scale / gestureStart.scale;
        const x = zoom * (Math.cos(rotationDelta) * gestureStart.focal.x - Math.sin(rotationDelta) * gestureStart.focal.y);
        const y = zoom * (Math.sin(rotationDelta) * gestureStart.focal.x + Math.cos(rotationDelta) * gestureStart.focal.y);
        panX = mid.x - innerWidth / 2 - x;
        panY = mid.y - innerHeight / 2 - y;
      }
      render();
    }, { passive: false });

    document.addEventListener('touchend', event => { beginGesture(event.touches); }, { passive: true });
    document.addEventListener('touchcancel', () => { gestureStart = null; }, { passive: true });
  </script>
</body>
</html>
